name: subsplit.yml
on:
  workflow_dispatch:
  push:
    # Only trigger for specific branches or changes in specific paths.
    branches:
      - 'main'
    paths:
      - k-core/**
      - k-extensions/**
    # Tag push events should be ignored, they will be handled with the create event below.
    tags-ignore:
      - '*'
  create:
    tags:
      - '*'
  delete:
    tags:
      - '*'
jobs:
  sync_commits:
    runs-on: ubuntu-latest
    name: Sync commits
    if: github.repository == 'kopl-ing/development' # Execute this workflow job only on the main repository.
    steps:
      -   uses: actions/checkout@v7
          with:
            persist-credentials: false
            fetch-depth: 0

      # Add a personal access token to the repository secrets. This will allow the splitter action to push the new commits
      -   uses: frankdejonge/use-github-token@1.1.0
          with:
            authentication: 'username:${{ secrets.SUBSPLIT_TOKEN }}'
            user_name: 'Daniel Klabbers'
            user_email: 'daniel+git@klabbers.email'

      # Cache the splitsh executable to speedup future runs
      -   name: Cache splitsh-lite
          uses: actions/cache@v6
          with:
            path: './splitsh'
            key: '${{ runner.os }}-splitsh-v101'

      # Sync commits and tags for the configured subtree splits
      # acrobat/subtree-splitter only recognizes push/create/delete events internally (via
      # process.env.GITHUB_EVENT_NAME); a manual workflow_dispatch run matches none of its
      # branches, so it sets up remotes and then silently does nothing. Force it to take the
      # "push" branch on a manual run — GITHUB_REF is already the dispatched branch, which is
      # all that branch needs.
      -   name: subtree split
          uses: acrobat/subtree-splitter@v1.1.5
          env:
            GITHUB_EVENT_NAME: ${{ github.event_name == 'workflow_dispatch' && 'push' || github.event_name }}
          with:
            config-path: .github/subsplit-config.json
